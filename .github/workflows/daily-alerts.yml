name: Alertes HACCP quotidiennes

on:
  schedule:
    # Tous les jours à 07:00 UTC = 08:00 Paris (hiver) / 09:00 (été)
    - cron: "0 7 * * *"
  workflow_dispatch: # Déclenchement manuel possible depuis GitHub

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher la vérification des alertes
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/check-alerts" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")
          echo "Réponse HTTP : $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Erreur lors de l'appel à l'Edge Function (HTTP $RESPONSE)"
            exit 1
          fi
          echo "Alertes envoyées avec succès."
